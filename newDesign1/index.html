<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ к информационным ресурсам города Москвы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="registration-form">
            <h1 class="site-title">ЕМИАС.ИНФО</h1>
            <h2>Регистрация</h2>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="fullName">ФИО *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </form>
            
            <div id="message" class="message"></div>

            <div class="instructions">
                <h3>Инструкция для входа в личный кабинет:</h3>
                <ul>
                    <li>Для физических лиц</li>
                    <li>Для юридических лиц и ИП</li>
                    <li>Для доверенных лиц организаций</li>
                </ul>
            </div>
        </div>

        <footer class="footer">
            <p>© Департамент информационных технологий города Москвы</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
